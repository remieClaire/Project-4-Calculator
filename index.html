<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Calculator App</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
 
  </head>  
  <body>
    <div class="wrapper">
        <section class="calculator-screen"></section>
    
        <section class="calculator-buttons">
          <div class="row">
            <button class="span-btn">C</button>
            <button>&#8592</button>
            <button>&#247</button>
          </div>
          <div class="row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>&#215</button>
          </div>
          <div class="row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>&#8722</button>
          </div>
          <div class="row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>&#43</button>
          </div>
          <div class="row">
            <button class="span-btn">0</button>
            <button>&#61</button>
          </div>
        </section>
    </div>
  </body>
</html>
