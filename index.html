<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Calculator App</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- link to javascript file -->
    <script src="script.js" defer></script>
 
  </head>  
  <body>
    <div class="wrapper">
        <section class="calculator-screen">
          <p class="screen" id="screen">0</p>
        </section>
    
        <section class="calculator-buttons">
          <div class="row">
            <button id="clear-btn" class="span-btn-c">C</button>
            <button id="del-btn">←</button>
            <button id="div-btn">÷</button>
          </div>
          <div class="row">
            <button id="7-btn">7</button>
            <button id="8-btn">8</button>
            <button id="9-btn">9</button>
            <button id="mult-btn">×</button>
          </div>
          <div class="row">
            <button id="4-btn">4</button>
            <button id="5-btn">5</button>
            <button id="6-btn">6</button>
            <button id="sub-btn">−</button>
          </div>
          <div class="row">
            <button id="1-btn">1</button>
            <button id="2-btn">2</button>
            <button id="3-btn">3</button>
            <button id="add-btn">+</button>
          </div>
          <div class="row">
            <button class="span-btn-zero" id="0-btn">0</button>
            <button id="equal-btn">=</button>
          </div>
        </section>
    </div>
  </body>
</html>
